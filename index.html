<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>梅花易数 · 交互精校版</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <h1>🌺 梅花易数 <small>· 观象玩占</small></h1>

    <!-- 起卦信息 -->
    <div class="card">
        <div class="card-title">🕐 起卦信息</div>

        <!-- ① 起卦方式 -->
        <div class="section-label">起卦方式</div>
        <div class="mode-switch" style="margin-bottom: 0;">
            <select id="divinationMode" style="padding:6px 12px; border-radius:30px; border:1.5px solid #dfd1c4; background:white; font-size: 13px;">
                <option value="date" selected>📆 日期起卦</option>
                <option value="number">🔢 数字起卦</option>
            </select>
        </div>

        <!-- ② 日期起卦：时间输入 -->
        <div id="dateInputSection" style="margin-top:12px;">
            <div class="section-label">起卦时间</div>
            <div class="input-row" id="dateInputRow">
                <div class="input-item compact date-year"><span class="date-field"><input type="number" id="gregYear" min="1900" max="2100" class="date-input" data-suffix="年"><span class="date-suffix">年</span></span></div>
                <div class="input-item compact date-short"><span class="date-field"><input type="number" id="gregMonth" min="1" max="12" class="date-input" data-suffix="月"><span class="date-suffix">月</span></span></div>
                <div class="input-item compact date-short"><span class="date-field"><input type="number" id="gregDay" min="1" max="31" class="date-input" data-suffix="日"><span class="date-suffix">日</span></span></div>
                <div class="input-item compact date-short"><span class="date-field"><input type="number" id="gregHour" min="0" max="23" class="date-input" data-suffix="时"><span class="date-suffix">时</span></span></div>
                <div class="input-item compact date-short"><span class="date-field"><input type="number" id="gregMinute" min="0" max="59" class="date-input" data-suffix="分"><span class="date-suffix">分</span></span></div>
                <button class="btn btn-small btn-now-time" id="nowTimeBtn">⏰ 当前时刻</button>
            </div>
        </div>

        <!-- ③ 数字起卦：数字输入 -->
        <div id="numberInputs" style="display:none; margin-top:12px;">
            <div class="section-label">起卦三数</div>
            <div class="input-row compact-row">
                <div class="input-item compact-num"><label>数1</label><input type="number" id="inputNum1" min="1" placeholder="-"></div>
                <div class="input-item compact-num"><label>数2</label><input type="number" id="inputNum2" min="1" placeholder="-"></div>
                <div class="input-item compact-num"><label>数3</label><input type="number" id="inputNum3" placeholder="-"></div>
            </div>
            <!-- 时令参考面板 -->
            <div id="timeRefPanel" style="margin-top:10px;">
                <div class="time-ref-toggle">
                    <span class="time-ref-option active" id="optNowTime">
                        <span class="time-ref-dot"></span>使用当前时间
                    </span>
                    <span class="time-ref-option" id="optCustomTime">
                        <span class="time-ref-dot"></span>使用自定义时间
                    </span>
                </div>
                <!-- 当前时间（默认显示，时间和干支同一行） -->
                <div id="timeRefNow" class="time-ref-content">
                    <span id="timeRefNowDisplay" style="font-size:13px; color:#7a6453;">--</span>
                    <span style="font-size:11px; color:#a18b7c; margin-left:6px;">用于断卦时令分析</span>
                </div>
                <!-- 自定义时间（展开后显示） -->
                <div id="timeRefCustom" class="time-ref-content" style="display:none;">
                    <div class="input-row">
                        <div class="input-item compact"><span class="date-field"><input type="number" id="refYear" min="1900" max="2100" class="date-input" data-suffix="年" disabled><span class="date-suffix">年</span></span></div>
                        <div class="input-item compact"><span class="date-field"><input type="number" id="refMonth" min="1" max="12" class="date-input" data-suffix="月" disabled><span class="date-suffix">月</span></span></div>
                        <div class="input-item compact"><span class="date-field"><input type="number" id="refDay" min="1" max="31" class="date-input" data-suffix="日" disabled><span class="date-suffix">日</span></span></div>
                        <div class="input-item compact"><span class="date-field"><input type="number" id="refHour" min="0" max="23" class="date-input" data-suffix="时" disabled><span class="date-suffix">时</span></span></div>
                        <div class="input-item compact"><span class="date-field"><input type="number" id="refMinute" min="0" max="59" class="date-input" data-suffix="分" disabled><span class="date-suffix">分</span></span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ④ 干支结果 -->
        <div style="margin-top:12px; padding: 8px 12px; background: #f3ede7; border-radius: 8px; border: 1px solid #e0d5c8;">
            <span id="displayGanzhi" style="font-size: 14px; color: #5a3f2e; font-weight: 500;">📌 干支：--</span>
        </div>

        <!-- 隐藏字段 -->
        <input type="hidden" id="numUp">
        <input type="hidden" id="numDown">
        <input type="hidden" id="numMove">
    </div>

    <!-- 起卦按钮 -->
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn" id="calculateBtn" style="margin-top:0;">🌙 起卦</button>
    </div>

    <!-- 结果卡片（起卦前隐藏） -->
    <div class="card result-area" id="resultCard" style="display:none;">
        <div class="card-title">🔮 卦象推演</div>
        <div id="resultContent"></div>
    </div>

    <!-- 解析面板折叠横条（起卦前隐藏） -->
    <div class="explain-collapsed-bar" id="explainCollapsedBar" style="display:none;">
        <div class="explain-bar-content" id="explainBtn">🔍 卦象解析</div>
    </div>

    <!-- 解析面板（起卦前隐藏） -->
    <div class="card explain-area" id="explainArea" style="display:none;">
        <div id="explainContent"></div>
    </div>


</div>

<!-- ① 基础数据常量 -->
<script src="js/data.js"></script>
<!-- ② 干支计算 -->
<script src="js/ganzhi.js"></script>
<!-- ③ 断卦核心逻辑 -->
<script src="js/divination.js"></script>
<!-- ④ 卦象渲染 -->
<script src="js/render.js"></script>
<!-- ⑤ 卦象解析 -->
<script src="js/explain.js"></script>
<!-- ⑥ 应用入口 -->
<script src="js/app.js"></script>
</body>
</html>
